<script>

const API_KEY = "1af5ece4d388d1960c27b72e6a9d917f";

let banners = [];
let atual = 0;

async function carregar(){

try{

const filmesReq = await fetch(
`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}&language=pt-BR`
);

const seriesReq = await fetch(
`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}&language=pt-BR`
);

const filmes = await filmesReq.json();
const series = await seriesReq.json();

banners = [

...(filmes.results || []).map(item => ({
...item,
tipo:"FILME"
})),

...(series.results || []).map(item => ({
...item,
tipo:"SÉRIE"
}))

].filter(item => item.backdrop_path);

mostrar();

setInterval(() => {

atual++;

if(atual >= banners.length){
atual = 0;
}

reiniciarBarra();
mostrar();

},8000);

}catch(e){

console.log(e);

document.getElementById("titulo").innerText =
"Erro ao carregar conteúdos";

}

}
  function reiniciarBarra(){

const barra =
document.getElementById("barra");

barra.style.animation = "none";

void barra.offsetWidth;

barra.style.animation =
"progress 8s linear infinite";

}

function atualizarMiniaturas(){

const container =
document.getElementById("miniaturas");

container.innerHTML = "";

for(let i=0;i<6;i++){

const index =
(atual + i) % banners.length;

const item =
banners[index];

const div =
document.createElement("div");

div.className =
i === 0
? "thumb ativa"
: "thumb";

if(item.poster_path){

div.style.backgroundImage =
`url(https://image.tmdb.org/t/p/w500${item.poster_path})`;

}

container.appendChild(div);

}

}

function mostrar(){

if(!banners.length) return;

const item =
banners[atual];

document.getElementById("banner").style.backgroundImage =
`url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;

document.getElementById("titulo").innerText =
item.title || item.name;

const sinopse =
item.overview || "";

document.getElementById("descricao").innerText =
sinopse.length > 180
? sinopse.substring(0,180) + "..."
: sinopse;

document.getElementById("tipo").innerText =
item.tipo;

const data =
item.release_date ||
item.first_air_date ||
"";

document.getElementById("ano").innerText =
data
? data.substring(0,4)
: "N/A";
  document.getElementById("nota").innerText =
"⭐ " +
(item.vote_average || 0).toFixed(1);

atualizarMiniaturas();

}

carregar();

</script>
