<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrunoTV Banners</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

#banner{
width:100vw;
height:100vh;
background-size:cover;
background-position:center;
position:relative;
animation:zoom 15s linear infinite alternate;
transition:background-image 1s ease;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(
to top,
rgba(0,0,0,0.95),
rgba(0,0,0,0.25)
);
}

.logo{
position:absolute;
top:20px;
right:20px;
width:180px;
z-index:10;
}

.topbar{
position:absolute;
top:20px;
left:20px;
color:white;
z-index:10;
}

#relogio{
font-size:42px;
font-weight:bold;
text-shadow:0 2px 10px rgba(0,0,0,.8);
}

#data{
font-size:18px;
opacity:.9;
text-transform:capitalize;
}

.info{
position:absolute;
left:50px;
bottom:70px;
max-width:850px;
color:white;
z-index:10;
}

.badges{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.badge{
background:#d60000;
padding:8px 16px;
border-radius:20px;
font-weight:bold;
font-size:14px;
}

h1{
font-size:56px;
margin-bottom:15px;
text-shadow:0 2px 10px rgba(0,0,0,.8);
}

p{
font-size:18px;
line-height:1.5;
max-width:700px;
text-shadow:0 2px 10px rgba(0,0,0,.8);
}

.loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:28px;
z-index:20;
}
</style>
</head>

<body>

<div id="banner">

<div class="overlay"></div>

<img class="logo" src="logo.png" alt="BrunoTV">

<div class="topbar">
<div id="relogio"></div>
<div id="data"></div>
</div>

<div class="info">

<div class="badges">
<div class="badge" id="tipo">FILME</div>
<div class="badge" id="ano">2025</div>
<div class="badge" id="nota">⭐ 0.0</div>
</div>

<h1 id="titulo">Carregando...</h1>

<p id="descricao"></p>

</div>

<div class="loading" id="loading">
Carregando banners...
</div>

</div>

<script>

const API_KEY = "1af5ece4d388d1960c27b72e6a9d917f";

let banners = [];
let atual = 0;

function atualizarRelogio(){

const agora = new Date();

document.getElementById("relogio").innerText =
agora.toLocaleTimeString("pt-BR",{
timeZone:"America/Sao_Paulo",
hour:"2-digit",
minute:"2-digit",
hour12:false
});

document.getElementById("data").innerText =
agora.toLocaleDateString("pt-BR",{
timeZone:"America/Sao_Paulo",
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
});

}

setInterval(atualizarRelogio,1000);
atualizarRelogio();

async function carregar(){

try{

const filmesReq = await fetch(
`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}&language=pt-BR`
);

const seriesReq = await fetch(
`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}&language=pt-BR`
);

const filmes = await filmesReq.json();
const series = await seriesReq.json();

const listaFilmes = (filmes.results || []).map(item => ({
...item,
tipo:"FILME"
}));

const listaSeries = (series.results || []).map(item => ({
...item,
tipo:"SÉRIE"
}));

banners = [...listaFilmes, ...listaSeries]
.filter(item => item.backdrop_path);

banners.sort(() => Math.random() - 0.5);

if(!banners.length){
document.getElementById("titulo").innerText =
"Nenhum banner encontrado";
return;
}

document.getElementById("loading").style.display = "none";

mostrar();

setInterval(() => {

atual++;

if(atual >= banners.length){
atual = 0;
}

mostrar();

},8000);

}catch(e){

document.getElementById("titulo").innerText =
"Erro ao carregar banners";

document.getElementById("descricao").innerText =
"Verifique sua conexão com a internet.";

console.log(e);

}

}

function mostrar(){

const item = banners[atual];

document.getElementById("banner").style.backgroundImage =
`url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;

document.getElementById("titulo").innerText =
item.title || item.name || "Sem título";

const sinopse = item.overview || "";

document.getElementById("descricao").innerText =
sinopse.length > 180
? sinopse.substring(0,180) + "..."
: sinopse;

document.getElementById("tipo").innerText =
item.tipo;

const dataLancamento =
item.release_date || item.first_air_date || "";

document.getElementById("ano").innerText =
dataLancamento
? dataLancamento.substring(0,4)
: "N/A";

document.getElementById("nota").innerText =
"⭐ " + (item.vote_average || 0).toFixed(1);

}

carregar();

</script>

</body>
</html>
