<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrunoTV Banners</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

#banner{
width:100vw;
height:100vh;
background-size:cover;
background-position:center;
position:relative;
transition:all 1s ease;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(
to top,
rgba(0,0,0,.9),
rgba(0,0,0,.2)
);
}

.info{
position:absolute;
bottom:60px;
left:60px;
max-width:700px;
color:white;
}

.logo{
position:absolute;
top:20px;
right:20px;
width:180px;
}

h1{
font-size:48px;
margin-bottom:15px;
}

p{
font-size:22px;
line-height:1.4;
}
</style>

</head>
<body>

<div id="banner">
<div class="overlay"></div>

<img class="logo" src="logo.png">

<div class="info">
<h1 id="titulo"></h1>
<p id="descricao"></p>
</div>
</div>

<script>

const API_KEY = "SUA_API_KEY_TMDB";

let banners = [];
let atual = 0;

async function carregar(){

const filmes = await fetch(
`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=pt-BR`
);

const dados = await filmes.json();

banners = dados.results.filter(
item => item.backdrop_path
);

mostrar();

setInterval(()=>{
atual++;
if(atual >= banners.length){
atual = 0;
}
mostrar();
},10000);

}

function mostrar(){

const item = banners[atual];

document.getElementById("banner").style.backgroundImage =
`url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;

document.getElementById("titulo").innerText =
item.title || item.name;

document.getElementById("descricao").innerText =
item.overview || "";

}

carregar();

</script>

</body>
</html>
