<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrunoTV Banners</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

#banner{
width:100vw;
height:100vh;
background-size:cover;
background-position:center;
position:relative;
animation:zoom 12s linear infinite;
}

@keyframes zoom{
0%{transform:scale(1);}
100%{transform:scale(1.08);}
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(
to top,
rgba(0,0,0,.95),
rgba(0,0,0,.2)
);
}

.logo{
position:absolute;
top:20px;
right:20px;
width:180px;
z-index:10;
}

.info{
position:absolute;
left:50px;
bottom:60px;
max-width:700px;
color:white;
z-index:10;
}

h1{
font-size:48px;
margin-bottom:15px;
}

p{
font-size:22px;
line-height:1.4;
}

.slogan{
position:absolute;
top:30px;
left:30px;
color:#fff;
font-size:20px;
font-weight:bold;
z-index:10;
}

.loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:24px;
}
</style>
</head>

<body>

<div id="banner">

<div class="overlay"></div>

<div class="slogan">
BrunoTV • Uma tela, infinitas possibilidades
</div>

<img class="logo" src="logo.png">

<div class="info">
<h1 id="titulo">Carregando...</h1>
<p id="descricao"></p>
</div>

<div class="loading" id="loading">
Carregando banners...
</div>

</div>

<script>

const API_KEY = "1af5ece4d388d1960c27b72e6a9d917f";

let banners = [];
let atual = 0;

async function carregar() {

try {

const resposta = await fetch(
`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=pt-BR`
);

const dados = await resposta.json();

banners = dados.results.filter(item => item.backdrop_path);

if(!banners.length){
document.getElementById("titulo").innerText =
"Nenhum banner encontrado";
return;
}

document.getElementById("loading").style.display = "none";

mostrar();

setInterval(() => {

atual++;

if(atual >= banners.length){
atual = 0;
}

mostrar();

}, 10000);

} catch (erro){

document.getElementById("titulo").innerText =
"Erro ao carregar banners";

document.getElementById("descricao").innerText =
"Verifique a conexão ou a chave da API.";

console.log(erro);

}

}

function mostrar(){

const item = banners[atual];

document.getElementById("banner").style.backgroundImage =
`url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;

document.getElementById("titulo").innerText =
item.title || item.name || "Sem título";

document.getElementById("descricao").innerText =
item.overview || "";

}

carregar();

</script>

</body>
</html>
