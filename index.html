*{

body{

#banner{
position:fixed;

background-size:cover;

}

.overlay{
position:absolute;

rgba(0,0,0,.15)
);
}

.logo{
position:absolute;
top:20px;
right:20px;
width:180px;

}

.info{
position:absolute;
left:50px;
bottom:220px;
max-width:800px;
color:white;
z-index:10;

.badges{
display:flex;

.badge{

}

#miniaturas{
position:absolute;
left:40px;
right:40px;
bottom:40px;
display:flex;
gap:12px;
overflow:hidden;
z-index:10;
}

.thumb{
width:180px;
height:100px;
background-size:cover;
background-position:center;
border-radius:10px;
border:3px solid transparent;
transition:.3s;
}

.thumb.ativa{
border-color:#ffffff;
transform:scale(1.05);
}

.progress{
position:absolute;
left:0;
bottom:0;
width:100%;
height:6px;
background:rgba(255,255,255,.15);
z-index:20;
}

.progress-bar{
height:100%;
width:0%;
background:#d60000;
animation:progress 8s linear infinite;
}

@keyframes progress{
from{width:0%;}
to{width:100%;}
}

</style>
