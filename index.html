<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrunoTV TV Box</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:Arial,sans-serif;
overflow:hidden;
}

#banner{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
transition:background-image 1s ease;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(
to top,
rgba(0,0,0,.95),
rgba(0,0,0,.2)
);
}

.logo{
position:absolute;
top:20px;
right:20px;
width:180px;
z-index:10;
}

.topbar{
position:absolute;
top:20px;
left:20px;
color:white;
z-index:10;
}

#relogio{
font-size:42px;
font-weight:bold;
}

#data{
font-size:18px;
text-transform:capitalize;
}

.info{
position:absolute;
left:50px;
bottom:180px;
max-width:800px;
color:white;
z-index:10;
}

.badges{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

.badge{
background:#d60000;
padding:8px 16px;
border-radius:20px;
font-size:14px;
font-weight:bold;
}

h1{
font-size:54px;
margin-bottom:10px;
text-shadow:0 2px 10px rgba(0,0,0,.8);
}

#descricao{
font-size:18px;
line-height:1.5;
max-width:700px;
}

#miniaturas{
position:absolute;
left:40px;
right:40px;
bottom:40px;
display:flex;
gap:12px;
overflow:hidden;
z-index:10;
}

.thumb{
width:180px;
height:100px;
background-size:cover;
background-position:center;
border-radius:10px;
border:3px solid transparent;
}

.thumb.ativa{
border-color:white;
transform:scale(1.05);
}

.progress{
position:absolute;
bottom:0;
left:0;
width:100%;
height:5px;
background:rgba(255,255,255,.15);
z-index:20;
}

.progress-bar{
height:100%;
width:0%;
background:#d60000;
animation:progress 8s linear infinite;
}

@keyframes progress{
from{width:0%;}
to{width:100%;}
}

</style>

</head>

<body>

<div id="banner">

<div class="overlay"></div>

<img src="logo.png" class="logo">

<div class="topbar">
<div id="relogio"></div>
<div id="data"></div>
</div>

<div class="info">

<div class="badges">
<div class="badge" id="tipo">FILME</div>
<div class="badge" id="ano">2025</div>
<div class="badge" id="nota">⭐ 0.0</div>
</div>

<h1 id="titulo">Carregando...</h1>

<div id="descricao"></div>

</div>

<div id="miniaturas"></div>

<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>

</div>

<script>

const API_KEY = "1af5ece4d388d1960c27b72e6a9d917f";

let banners = [];
let atual = 0;

function atualizarRelogio(){

const agora = new Date();

document.getElementById("relogio").innerText =
agora.toLocaleTimeString("pt-BR",{
timeZone:"America/Sao_Paulo",
hour:"2-digit",
minute:"2-digit"
});

document.getElementById("data").innerText =
agora.toLocaleDateString("pt-BR",{
timeZone:"America/Sao_Paulo",
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
});

}

setInterval(atualizarRelogio,1000);
atualizarRelogio();

async function carregar(){

const filmesReq = await fetch(
`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}&language=pt-BR`
);

const seriesReq = await fetch(
`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}&language=pt-BR`
);

const filmes = await filmesReq.json();
const series = await seriesReq.json();

banners = [

...(filmes.results || []).map(i => ({
...i,
tipo:"FILME"
})),

...(series.results || []).map(i => ({
...i,
tipo:"SÉRIE"
}))

].filter(i => i.backdrop_path);

mostrar();

setInterval(()=>{

atual++;

if(atual >= banners.length){
atual = 0;
}

reiniciarBarra();
mostrar();

},8000);

}

function reiniciarBarra(){

const barra =
document.getElementById("barra");

barra.style.animation = "none";

void barra.offsetWidth;

barra.style.animation =
"progress 8s linear infinite";

}

function atualizarMiniaturas(){

const container =
document.getElementById("miniaturas");

container.innerHTML = "";

for(let i=0;i<6;i++){

const index =
(atual + i) % banners.length;

const item =
banners[index];

const div =
document.createElement("div");

div.className =
i === 0
? "thumb ativa"
: "thumb";

if(item.poster_path){

div.style.backgroundImage =
`url(https://image.tmdb.org/t/p/w500${item.poster_path})`;

}

container.appendChild(div);

}

}

function mostrar(){

const item = banners[atual];

document.getElementById("banner").style.backgroundImage =
`url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;

document.getElementById("titulo").innerText =
item.title || item.name;

const sinopse =
item.overview || "";

document.getElementById("descricao").innerText =
sinopse.length > 180
? sinopse.substring(0,180)+"..."
: sinopse;

document.getElementById("tipo").innerText =
item.tipo;

const data =
item.release_date ||
item.first_air_date ||
"";

document.getElementById("ano").innerText =
data ? data.substring(0,4) : "N/A";

document.getElementById("nota").innerText =
"⭐ " +
(item.vote_average || 0).toFixed(1);

atualizarMiniaturas();

}

carregar();

</script>

</body>
</html>
